apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ehr-pipeline-autoscaler
  namespace: tenant-uw-medicine
  labels:
    tenant-id: uw-001
    cost-center: research-and-development
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ehr-data-pipeline-deployment
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
